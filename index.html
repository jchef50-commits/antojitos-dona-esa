<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antojitos Doña Esa - Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .font-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-amber-50/40 text-gray-800 min-h-screen pb-32">

    <header class="bg-red-700 text-white text-center py-8 px-4 shadow-md relative border-b-4 border-yellow-500">
        <h1 class="font-title text-4xl md:text-5xl font-bold tracking-wide">Antojitos Doña Esa</h1>
        <p class="text-yellow-300 italic mt-2 text-sm md:text-base">"Sabor que enamora, como en casa"</p>
        <p class="text-xs mt-3 bg-red-800 inline-block px-3 py-1 rounded-full text-gray-200">
            📍 Av. Nueva Imagen (A un costado de Crepas El Rincón Francés)
        </p>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div id="menu-container" class="space-y-12"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] p-4 transform translate-y-full transition-transform duration-300 z-50">
        <div class="max-w-4xl mx-auto space-y-4">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">Tu Pedido</p>
                    <p class="text-xl font-bold text-red-700" id="cart-total">$0.00</p>
                </div>
                <button onclick="sendWhatsAppOrder()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl flex items-center gap-2 shadow-md transition-all active:scale-95 whitespace-nowrap">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.93 0c3.165.001 6.14 1.233 8.377 3.469 2.236 2.236 3.468 5.211 3.468 8.376 0 6.533-5.348 11.87-11.881 11.87-2.023 0-3.992-.514-5.741-1.489L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.593h.005c5.448 0 9.886-4.434 9.888-9.881.001-2.641-1.027-5.124-2.893-6.99C17.18 3.05 14.698 2.023 12.057 2.022c-5.449 0-9.887 4.434-9.889 9.882-.001 2.225.651 4.391 1.889 6.242l-.999 3.648 3.596-.945zm11.387-5.356c-.304-.152-1.799-.887-2.078-.987-.278-.101-.48-.152-.683.152-.202.304-.784.987-.961 1.19-.177.202-.354.228-.658.076-.304-.152-1.284-.473-2.445-1.508-.903-.805-1.513-1.799-1.69-2.103-.177-.304-.019-.468.133-.62.137-.136.304-.354.456-.532.152-.177.202-.304.304-.506.101-.202.051-.38-.025-.532-.076-.152-.683-1.646-.936-2.254-.246-.592-.497-.511-.683-.52l-.582-.01c-.202 0-.532.076-.81.38-.278.304-1.063 1.038-1.063 2.532 0 1.494 1.089 2.937 1.241 3.139.152.202 2.146 3.277 5.2 4.594.726.313 1.292.5 1.734.64.729.232 1.393.199 1.917.121.585-.087 1.799-.734 2.053-1.443.253-.709.253-1.316.177-1.443-.076-.126-.278-.202-.582-.354z"/></svg>
                    Pedir por WhatsApp
                </button>
            </div>

            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                <p class="text-sm font-semibold text-gray-700 mb-3">¿Cómo deseas tu pedido?</p>
                <div class="grid gap-3 sm:grid-cols-2">
                    <label class="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-4 py-3 cursor-pointer hover:border-red-300 transition-colors">
                        <input type="radio" name="orderType" value="recoger" checked class="accent-red-700" onchange="handleOrderTypeChange()">
                        <span>
                            <span class="block font-semibold text-gray-800">Pasar a recoger</span>
                            <span class="block text-xs text-gray-500">Recoge tu pedido en el local</span>
                        </span>
                    </label>
                    <label class="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-4 py-3 cursor-pointer hover:border-red-300 transition-colors">
                        <input type="radio" name="orderType" value="mesa" class="accent-red-700" onchange="handleOrderTypeChange()">
                        <span>
                            <span class="block font-semibold text-gray-800">Pedir a mesa</span>
                            <span class="block text-xs text-gray-500">Te llevamos el pedido a tu mesa</span>
                        </span>
                    </label>
                </div>

                <div id="table-number-container" class="hidden mt-4">
                    <label for="table-number" class="block text-sm font-semibold text-gray-700 mb-2">Número de mesa</label>
                    <input id="table-number" type="text" inputmode="numeric" placeholder="Ej. 4" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-300 focus:border-red-400">
                </div>
            </div>
        </div>
    </div>

    <script>
        const BUSINESS_PHONE = "529931387656";

        const menuData = {
            "Empanadas": [
                { id: "emp_pollo", name: "Pollo", price: 16 },
                { id: "emp_res", name: "Res", price: 20 },
                { id: "emp_frijol", name: "Frijol", price: 16 },
                { id: "emp_pierna", name: "Pierna", price: 20 },
                { id: "emp_camaron", name: "Camarón c/ queso", price: 30 },
                { id: "emp_queso_azucar", name: "Queso c/ azúcar", price: 16 },
                { id: "emp_queso_hebra", name: "Queso de hebra", price: 16 },
                { id: "emp_combinada", name: "Combinada", price: 22 }
            ],
            "Panuchos": [
                { id: "pan_pollo", name: "Pollo", price: 20 },
                { id: "pan_res", name: "Res", price: 24 },
                { id: "pan_frijol", name: "Frijol", price: 20 },
                { id: "pan_pierna", name: "Pierna", price: 24 },
                { id: "pan_queso_hebra", name: "Queso de hebra", price: 20 },
                { id: "pan_combinada", name: "Combinada", price: 26 }
            ],
            "Tostadas": [
                { id: "tos_pollo", name: "Pollo", price: 18 },
                { id: "tos_res", name: "Res", price: 20 },
                { id: "tos_pierna", name: "Pierna", price: 20 }
            ],
            "Salbutes": [
                { id: "sal_pollo", name: "Pollo", price: 20 },
                { id: "sal_res", name: "Res", price: 24 },
                { id: "sal_pierna", name: "Pierna", price: 24 }
            ],
            "Sándwichs": [
                { id: "san_jamon", name: "Jamón", price: 40 },
                { id: "san_pollo", name: "Pollo", price: 50 },
                { id: "san_pierna", name: "Pierna", price: 55 },
                { id: "san_club", name: "Club Sándwich", price: 100 }
            ],
            "Orden de Platanitos": [
                { id: "plat_queso_crema", name: "c/ Queso y Crema", price: 30 },
                { id: "plat_relleno", name: "Plátano Relleno de Queso y Crema", price: 25 }
            ],
            "Quesadillas": [
                { id: "ques_naturales", name: "Naturales (3 pzas)", price: 40 },
                { id: "ques_jamon", name: "Jamón (3 pzas)", price: 50 },
                { id: "ques_mix", name: "Jamón c/ pollo o pierna (1 pza)", price: 25 }
            ],
            "Huevos al Gusto": [
                { id: "hue_gusto", name: "Naturales, Mexicana, Jamón o Longaniza", price: 75 },
                { id: "hue_omelet", name: "Omelet c/ jamón y queso", price: 90 }
            ],
            "Bebidas": [
                { id: "beb_aguas", name: "Aguas frescas 1/2 litro", price: 25 },
                { id: "beb_refresco", name: "Refresco embotellado", price: 25 }
            ]
        };

        let cart = {};

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            for (const [category, items] of Object.entries(menuData)) {
                const categorySection = document.createElement('section');
                categorySection.className = 'bg-white rounded-2xl p-6 shadow-sm border border-amber-100';
                
                categorySection.innerHTML = `
                    <h2 class="font-title text-2xl font-bold text-red-700 mb-4 border-b pb-2 border-yellow-500/30">${category}</h2>
                    <div class="grid gap-4 sm:grid-cols-2">
                        ${items.map(item => `
                            <div class="flex items-center justify-between p-3 rounded-xl bg-amber-50/30 hover:bg-amber-50/70 transition-colors">
                                <div class="pr-2">
                                    <h3 class="font-semibold text-gray-800">${item.name}</h3>
                                    <p class="text-sm font-bold text-yellow-600">$${item.price}.00</p>
                                </div>
                                <div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                                    <button onclick="updateQuantity('${item.id}', -1)" class="w-8 h-8 rounded-md bg-gray-100 hover:bg-red-100 hover:text-red-600 font-bold flex items-center justify-center transition-colors">-</button>
                                    <span id="qty-${item.id}" class="w-6 text-center font-bold text-sm">0</span>
                                    <button onclick="updateQuantity('${item.id}', 1)" class="w-8 h-8 rounded-md bg-gray-100 hover:bg-green-100 hover:text-green-600 font-bold flex items-center justify-center transition-colors">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(categorySection);
            }
        }

        function updateQuantity(itemId, change) {
            let itemMeta = null;

            for (const items of Object.values(menuData)) {
                const found = items.find(i => i.id === itemId);
                if (found) {
                    itemMeta = found;
                    break;
                }
            }

            if (!itemMeta) return;

            if (!cart[itemId]) {
                cart[itemId] = { ...itemMeta, quantity: 0 };
            }

            cart[itemId].quantity += change;

            if (cart[itemId].quantity <= 0) {
                delete cart[itemId];
                document.getElementById(`qty-${itemId}`).innerText = 0;
            } else {
                document.getElementById(`qty-${itemId}`).innerText = cart[itemId].quantity;
            }

            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            let totalItems = 0;

            for (const item of Object.values(cart)) {
                total += item.price * item.quantity;
                totalItems += item.quantity;
            }

            document.getElementById('cart-total').innerText = `$${total}.00 MXN`;

            const cartBar = document.getElementById('cart-bar');
            if (totalItems > 0) {
                cartBar.classList.remove('translate-y-full');
            } else {
                cartBar.classList.add('translate-y-full');
            }
        }

        function handleOrderTypeChange() {
            const selectedType = document.querySelector('input[name="orderType"]:checked')?.value;
            const tableContainer = document.getElementById('table-number-container');
            const tableInput = document.getElementById('table-number');

            if (selectedType === 'mesa') {
                tableContainer.classList.remove('hidden');
            } else {
                tableContainer.classList.add('hidden');
                tableInput.value = '';
            }
        }

        function sendWhatsAppOrder() {
            const items = Object.values(cart);
            if (items.length === 0) return;

            const selectedType = document.querySelector('input[name="orderType"]:checked')?.value || 'recoger';
            const tableNumber = document.getElementById('table-number').value.trim();

            if (selectedType === 'mesa' && !tableNumber) {
                alert('Por favor, escribe el número de mesa antes de enviar tu pedido.');
                document.getElementById('table-number').focus();
                return;
            }

            let message = `¡Hola, *Antojitos Doña Esa*! 🤤\nQuiero hacer el siguiente pedido:\n\n`;
            let total = 0;

            for (const item of items) {
                const subtotal = item.price * item.quantity;
                message += `• ${item.quantity}x ${item.name} ($${subtotal}.00)\n`;
                total += subtotal;
            }

            message += `\n💰 *Total a cobrar: $${total}.00 MXN*\n`;

            if (selectedType === 'mesa') {
                message += `🍽️ _Quiero mi pedido para mesa._\n`;
                message += `🪑 *Mesa: ${tableNumber}*`;
            } else {
                message += `📍 _Paso a recoger mi pedido al local en Av. Nueva Imagen._`;
            }

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${BUSINESS_PHONE}?text=${encodedMessage}`;

            window.open(whatsappUrl, '_blank');
        }

        window.onload = () => {
            renderMenu();
            handleOrderTypeChange();
        };
    </script>
</body>
</html>
